<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>釧路・米町 夕日ナビ（航空写真版）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; }
        #controls { padding: 15px; background: rgba(44, 62, 80, 0.9); color: white; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; width: 100%; }
        input[type="date"] { padding: 8px; border-radius: 4px; border: none; font-size: 16px; margin-top: 5px; width: 100%; max-width: 200px; }
        .info-panel { margin-top: 10px; font-weight: bold; color: #ffca28; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

<div id="controls">
    <strong>日付を選択して夕日の方向を確認:</strong><br>
    <input type="date" id="date-picker">
    <div class="info-panel" id="sunset-info">読み込み中...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
    // 1. 基本設定（炉ばたとワイン K の座標）
    const shopLat = 42.968995;
    const shopLng = 144.373180;
    let sunsetLine = null;

    // 地図の初期化
    const map = L.map('map').setView([shopLat, shopLng], 17); // 航空写真なので少しズームアップ

    // ★ここを「航空写真タイル」に変更しました
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
    }).addTo(map);

    // お店の位置にマーカー
    const marker = L.marker([shopLat, shopLng]).addTo(map).bindPopup("炉ばたとワイン K");

    // 2. カレンダー設定
    const dateInput = document.getElementById('date-picker');
    dateInput.value = new Date().toISOString().split('T')[0];

    // 3. 更新関数
    function updateSunsetDirection() {
        const selectedDate = new Date(dateInput.value);
        const times = SunCalc.getTimes(selectedDate, shopLat, shopLng);
        const sunsetPos = SunCalc.getPosition(times.sunset, shopLat, shopLng);
        
        const azimuth = sunsetPos.azimuth; 
        
        if (sunsetLine) { map.removeLayer(sunsetLine); }

        // 線の長さ（航空写真で見やすいように調整）
        const d = 0.01; 
        const endLat = shopLat + d * Math.cos(azimuth + Math.PI);
        const endLng = shopLng + d * Math.sin(azimuth + Math.PI);

        // 夕日の光線を「太いオレンジの光」のように表現
        sunsetLine = L.polyline([[shopLat, shopLng], [endLat, endLng]], {
            color: '#ff4500',
            weight: 10,
            opacity: 0.5,
            lineCap: 'round'
        }).addTo(map);

        const timeStr = times.sunset.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('sunset-info').innerHTML = 
            `🌅 日没: ${timeStr}頃 <br> 方角: ${(azimuth * 180 / Math.PI + 180).toFixed(1)}° (真北0°)`;
    }

    dateInput.addEventListener('change', updateSunsetDirection);
    updateSunsetDirection();
</script>
</body>
</html>
