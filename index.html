<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>釧路・米町 夕日ナビ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #2c3e50; color: white; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #map { flex-grow: 1; width: 100%; }
        input[type="date"] { padding: 8px; border-radius: 4px; border: none; font-size: 16px; margin-top: 5px; }
        .info-panel { margin-top: 10px; font-weight: bold; color: #ffca28; }
    </style>
</head>
<body>

<div id="controls">
    <strong>日付を選択:</strong><br>
    <input type="date" id="date-picker">
    <div class="info-panel" id="sunset-info">読み込み中...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
    // 1. 基本設定（炉ばたとワイン K の座標）
    const shopLat = 42.968995;
    const shopLng = 144.373180;
    let sunsetLine = null;

    // 地図の初期化
    const map = L.map('map').setView([shopLat, shopLng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // お店のマーカー
    L.marker([shopLat, shopLng]).addTo(map).bindPopup("炉ばたとワイン K").openPopup();

    // 2. カレンダーの初期値を今日に設定
    const dateInput = document.getElementById('date-picker');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    // 3. 更新関数：日付が変わるたびに呼び出す
    function updateSunsetDirection() {
        const selectedDate = new Date(dateInput.value);
        
        // SunCalcで計算
        const times = SunCalc.getTimes(selectedDate, shopLat, shopLng);
        const sunsetPos = SunCalc.getPosition(times.sunset, shopLat, shopLng);
        
        // 方位角（ラジアン）を計算
        const azimuth = sunsetPos.azimuth; 
        
        // 前の線を消す
        if (sunsetLine) {
            map.removeLayer(sunsetLine);
        }

        // 線の終点を計算（地図上で見やすいように約5kmの長さに設定）
        const d = 0.05; 
        const endLat = shopLat + d * Math.cos(azimuth + Math.PI);
        const endLng = shopLng + d * Math.sin(azimuth + Math.PI);

        // 新しい線を引く
        sunsetLine = L.polyline([[shopLat, shopLng], [endLat, endLng]], {
            color: '#e67e22',
            weight: 6,
            opacity: 0.7,
            dashArray: '5, 10'
        }).addTo(map);

        // テキスト表示の更新
        const timeStr = times.sunset.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('sunset-info').innerHTML = 
            `🌅 日没時刻: ${timeStr} <br> 角度: ${(azimuth * 180 / Math.PI + 180).toFixed(1)}度`;
    }

    // イベントリスナー：日付を変えたら実行
    dateInput.addEventListener('change', updateSunsetDirection);

    // 初回実行
    updateSunsetDirection();

</script>
</body>
</html>
