<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>K - 釧路・米町 夕日ナビ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #ff7e5f; --gold: #feb47b; --glass: rgba(26, 26, 26, 0.9); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: #fff; overflow: hidden; }
        
        /* 読み込み中の表示 */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; font-size: 14px; letter-spacing: 2px; color: var(--gold);
        }

        #controls { 
            position: absolute; top: 15px; left: 15px; right: 15px; 
            padding: 20px; background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; z-index: 1000;
        }

        h1 { margin: 0 0 10px; font-size: 16px; letter-spacing: 2px; color: var(--gold); }
        input[type="date"] { 
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 10px; border-radius: 8px; font-size: 16px; margin-bottom: 10px;
        }

        .time-label { font-size: 42px; font-weight: 200; line-height: 1; }
        #map { height: 100%; width: 100%; background: #1a1a1a; } /* 地図エリアを確保 */

        .k-marker {
            background: var(--accent); width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>

<div id="loader">MAP LOADING...</div>

<div id="controls">
    <h1>K - SUNSET NAVI</h1>
    <input type="date" id="date-picker">
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
            <label style="font-size:10px; opacity:0.6;">SUNSET</label>
            <div class="time-label" id="sunset-time">--:--</div>
        </div>
        <div id="sunset-deg" style="font-size:12px; color:var(--gold);">---°</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
    const shopLat = 42.968995;
    const shopLng = 144.373180;
    let sunsetLine = null;

    // 地図の初期化
    const map = L.map('map', { zoomControl: false }).setView([shopLat, shopLng], 17);

    // 航空写真タイルのURLをより安定したものに変更
    L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        attribution: '&copy; Google Maps'
    }).addTo(map);

    // 地図が読み込まれたらローダーを消す
    map.on('tileload', function() {
        document.getElementById('loader').style.display = 'none';
    });

    // お店のピン
    const kIcon = L.divIcon({ className: 'custom-icon', html: "<div class='k-marker'></div>", iconSize: [12, 12], iconAnchor: [6, 6] });
    L.marker([shopLat, shopLng], {icon: kIcon}).addTo(map);

    const dateInput = document.getElementById('date-picker');
    dateInput.value = new Date().toISOString().split('T')[0];

    function update() {
        const date = new Date(dateInput.value);
        date.setHours(12, 0, 0);
        const times = SunCalc.getTimes(date, shopLat, shopLng);
        const pos = SunCalc.getPosition(times.sunset, shopLat, shopLng);
        
        if (sunsetLine) map.removeLayer(sunsetLine);

        const d = 0.03;
        const endLat = shopLat + d * Math.cos(pos.azimuth + Math.PI);
        const endLng = shopLng + d * Math.sin(pos.azimuth + Math.PI);

        sunsetLine = L.polyline([[shopLat, shopLng], [endLat, endLng]], {
            color: '#feb47b', weight: 4, opacity: 0.8, dashArray: '5, 10'
        }).addTo(map);

        document.getElementById('sunset-time').innerText = times.sunset.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sunset-deg').innerText = `方位角: ${(pos.azimuth * 180 / Math.PI + 180).toFixed(1)}°`;
    }

    dateInput.addEventListener('change', update);
    update();
</script>
</body>
</html>
