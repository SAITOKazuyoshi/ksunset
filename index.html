<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>K - SUNSET NAVI</title>
    <!-- モバイル向けの表示設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- LeafletのCSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #ff7e5f;
            --gold: #feb47b;
            --glass: rgba(26, 26, 26, 0.9);
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
        }

        /* 操作パネル：PC/スマホ共用 */
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            max-width: 400px; /* PCでの広がりすぎを防止 */
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(254, 180, 123, 0.2);
            padding-bottom: 8px;
        }

        .instruction {
            font-size: 10px;
            opacity: 0.5;
            margin-bottom: 10px;
            display: block;
        }

        .date-container {
            margin-bottom: 15px;
        }

        input[type="date"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            cursor: pointer;
        }

        .info-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .sunset-info {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .time-val {
            font-size: 42px;
            font-weight: 200;
            line-height: 1;
        }

        .location-info {
            text-align: right;
            font-size: 11px;
            color: var(--gold);
        }

        /* GPSボタン */
        #gps-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--gold);
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s, background 0.2s;
        }

        #gps-btn:hover {
            background: rgba(254, 180, 123, 0.2);
        }

        #gps-btn:active {
            transform: scale(0.9);
        }

        #gps-btn svg {
            fill: var(--gold);
            width: 28px;
            height: 28px;
        }

        /* 地図 */
        #map {
            height: 100%;
            width: 100%;
            background: #111;
            cursor: crosshair; /* 地点を選べることを示すカーソル */
        }

        /* 現在地・指定地マーカーのアニメーション */
        .pulse-marker {
            background: #3498db;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px #3498db;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(52, 152, 219, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); }
        }

        .shop-marker {
            background: var(--accent);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>

<div id="controls">
    <h1>K - SUNSET NAVI</h1>
    <span class="instruction">地図をダブルクリックで地点変更</span>
    
    <div class="date-container">
        <input type="date" id="date-picker">
    </div>
    
    <div class="info-grid">
        <div class="sunset-info">
            <span class="label">Sunset Time</span>
            <span class="time-val" id="time-val">--:--</span>
        </div>
        <div class="location-info">
            <span id="place-name">炉ばたとワイン K</span><br>
            <span id="deg-val">---°</span>
        </div>
    </div>
</div>

<div id="gps-btn" title="現在地を取得">
    <svg viewBox="0 0 24 24">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
    </svg>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
    // --------------------------------------------------
    // 設定と初期化
    // --------------------------------------------------
    
    const SHOP_LAT = 42.968995;
    const SHOP_LNG = 144.373180;
    
    let currentLat = SHOP_LAT;
    let currentLng = SHOP_LNG;
    let sunsetLine = null;
    let locationMarker = null;

    // 地図の初期化
    // 地点選択をしやすくするため、doubleClickZoomを無効化
    const map = L.map('map', { 
        zoomControl: false,
        attributionControl: true,
        doubleClickZoom: false 
    }).setView([currentLat, currentLng], 17);

    // Google衛星写真タイル
    L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        attribution: '&copy; Google Maps'
    }).addTo(map);

    const datePicker = document.getElementById('date-picker');
    datePicker.value = new Date().toISOString().split('T')[0];

    // --------------------------------------------------
    // 計算と更新ロジック
    // --------------------------------------------------

    function updateSunset() {
        const selectedDate = new Date(datePicker.value);
        selectedDate.setHours(12, 0, 0);

        const times = SunCalc.getTimes(selectedDate, currentLat, currentLng);
        const pos = SunCalc.getPosition(times.sunset, currentLat, currentLng);
        const azimuth = pos.azimuth;

        if (sunsetLine) map.removeLayer(sunsetLine);

        const d = 0.04; 
        const endLat = currentLat + d * Math.cos(azimuth + Math.PI);
        const endLng = currentLng + d * Math.sin(azimuth + Math.PI);

        sunsetLine = L.polyline([[currentLat, currentLng], [endLat, endLng]], {
            color: '#feb47b',
            weight: 5,
            opacity: 0.8,
            dashArray: '8, 12',
            lineCap: 'round'
        }).addTo(map);

        const sunsetStr = times.sunset.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('time-val').innerText = sunsetStr;
        
        const deg = (azimuth * 180 / Math.PI + 180).toFixed(1);
        document.getElementById('deg-val').innerText = `方位角: ${deg}°`;
    }

    // マーカーの表示更新
    function updateMarker(lat, lng, isUserPoint = true) {
        if (locationMarker) map.removeLayer(locationMarker);
        
        const iconClass = isUserPoint ? 'pulse-marker' : 'shop-marker';
        const icon = L.divIcon({
            className: 'custom-icon',
            html: `<div class="${iconClass}"></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });

        locationMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
    }

    // --------------------------------------------------
    // インタラクション (GPS & Click)
    // --------------------------------------------------

    // 地図ダブルクリック時の処理
    map.on('dblclick', function(e) {
        currentLat = e.latlng.lat;
        currentLng = e.latlng.lng;
        
        document.getElementById('place-name').innerText = "指定地点";
        updateMarker(currentLat, currentLng, true);
        updateSunset();
    });

    // 現在地取得 (GPS)
    function getLocation() {
        if (!navigator.geolocation) {
            alert("お使いのブラウザは位置情報をサポートしていません。");
            return;
        }

        const btn = document.getElementById('gps-btn');
        btn.style.opacity = "0.5";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                currentLat = position.coords.latitude;
                currentLng = position.coords.longitude;

                map.flyTo([currentLat, currentLng], 17);
                document.getElementById('place-name').innerText = "現在地";
                updateMarker(currentLat, currentLng, true);
                btn.style.opacity = "1";
                updateSunset();
            },
            (error) => {
                btn.style.opacity = "1";
                alert("位置情報の取得に失敗しました。利用を許可してください。");
            },
            { enableHighAccuracy: true }
        );
    }

    // --------------------------------------------------
    // 初期実行
    // --------------------------------------------------

    datePicker.addEventListener('change', updateSunset);
    document.getElementById('gps-btn').addEventListener('click', getLocation);

    // 最初はお店の位置を表示
    updateMarker(SHOP_LAT, SHOP_LNG, false);
    updateSunset();

</script>
</body>
</html>
